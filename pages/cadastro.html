<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do QA - Cadastro</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="./assets/js/cadastro.js"></script>
</head>

<body>

    <div class="image-container">
        <img src="../assets/images/hqa.png" alt="Hora do QA">
        <h2>Hora do QA</h2>
    </div>

    <div class="login-container">

        <h2>CADASTRO</h2>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Nome completo"
                required>

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required>

            <input
                type="password"
                id="password"
                placeholder="Senha"
                minlength="8"
                required>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirmar senha"
                minlength="8"
                required>

            <button type="submit">
                Criar Conta
            </button>

        </form>

        <p id="message"></p>

        <p style="margin-top:20px;color:#FFF;font-size:.9rem;">
            Já possui uma conta?
            <a href="./index.html" style="color:#60a5fa;text-decoration:none;font-weight:bold;">
                Fazer login
            </a>
        </p>

    </div>

</body>

</html>
